name: Merchant Screenshot

on:
  schedule:
    # 北京时间 7、8、10、11、14、16、19点15分 (UTC 23,0,2,3,6,8,11)
    - cron: '15 23,0,2,3,6,8,11 * * *'
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Chinese fonts
        run: |
          # 安装中文字体（重试3次）
          for i in 1 2 3; do
            if sudo apt-get update && sudo apt-get install -y fonts-noto-cjk fonts-wqy-zenhei; then
              break
            fi
            echo "安装失败，等待10秒后重试..."
            sleep 10
          done
          # 创建字体配置文件，确保系统能正确识别中文字体
          mkdir -p ~/.config/fontconfig/conf.d
          echo '<?xml version="1.0"?>
          <!DOCTYPE fontconfig SYSTEM "fonts.dtd">
          <fontconfig>
            <match target="pattern">
              <test name="family"><string>Microsoft YaHei</string></test>
              <edit name="family" mode="assign"><string>Noto Sans CJK SC</string></edit>
            </match>
            <match target="pattern">
              <test name="family"><string>SimSun</string></test>
              <edit name="family" mode="assign"><string>Noto Sans CJK SC</string></edit>
            </match>
            <match target="pattern">
              <test name="family"><string>STHeiti</string></test>
              <edit name="family" mode="assign"><string>Noto Sans CJK SC</string></edit>
            </match>
            <match target="pattern">
              <test name="family"><string>PingFang SC</string></test>
              <edit name="family" mode="assign"><string>Noto Sans CJK SC</string></edit>
            </match>
          </fontconfig>' > ~/.config/fontconfig/conf.d/99-chinese-fonts.conf
          fc-cache -f -v || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run screenshot script
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          LKWG_URL: ${{ secrets.LKWG_URL }}
        run: |
          python yxsr_ci.py