name: Merchant Screenshot

on:
  schedule:
    # 北京时间 8:00, 12:00, 16:00, 20:00 (UTC 0,4,8,12)
    - cron: '0 0,4,8,12 * * *'
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 缓存 pip 包
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 缓存 Playwright 浏览器二进制文件（约300MB）
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies with Chinese mirrors
        env:
          # pip 使用清华源（速度稳定）
          PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
          # 可选：阿里云源 https://mirrors.aliyun.com/pypi/simple/
          # PIP_INDEX_URL: https://mirrors.aliyun.com/pypi/simple/
          # Playwright 浏览器使用国内 CDN
          PLAYWRIGHT_DOWNLOAD_HOST: https://npmmirror.com/mirrors/playwright/
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 安装 Chromium（会从 PLAYWRIGHT_DOWNLOAD_HOST 下载）
          playwright install chromium

      - name: Run screenshot script
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          LKWG_URL: ${{ secrets.LKWG_URL }}
        run: python yxsr_ci.py
