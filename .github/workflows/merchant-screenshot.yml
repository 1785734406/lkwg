name: Merchant Screenshot

on:
  schedule:
    # 北京时间 8:00, 12:00, 16:00, 20:00 (UTC 0,4,8,12)
    - cron: '0 0,4,8,12 * * *'
  workflow_dispatch:

jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 缓存 pip 包
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 缓存 Playwright 浏览器二进制文件（约300MB）
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        env:
          PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Debug - Check environment variables
        run: |
          echo "DINGTALK_WEBHOOK set: ${{ secrets.DINGTALK_WEBHOOK != '' }}"
          echo "DINGTALK_SECRET set: ${{ secrets.DINGTALK_SECRET != '' }}"
          echo "GITEE_OWNER set: ${{ secrets.GITEE_OWNER != '' }}"
          echo "GITEE_REPO set: ${{ secrets.GITEE_REPO != '' }}"
          echo "GITEE_TOKEN set: ${{ secrets.GITEE_TOKEN != '' }}"
          echo "LKWG_URL set: ${{ secrets.LKWG_URL != '' }}"

      - name: Run screenshot script
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          LKWG_URL: ${{ secrets.LKWG_URL }}
        run: |
          python yxsr_ci.py
        continue-on-error: false