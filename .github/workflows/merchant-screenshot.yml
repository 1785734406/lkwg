name: Merchant Screenshot

on:
  schedule:
    # 北京时间 8:00, 12:00, 16:00, 20:00 (UTC 0,4,8,12)
    # 添加额外时间点增加触发机会，减少延迟影响
    - cron: '0 0 * * *'      # UTC 0:00 = 北京时间 8:00
    - cron: '15 0 * * *'     # UTC 0:15 = 北京时间 8:15（备用）
    - cron: '0 4 * * *'      # UTC 4:00 = 北京时间 12:00
    - cron: '15 4 * * *'     # UTC 4:15 = 北京时间 12:15（备用）
    - cron: '0 8 * * *'      # UTC 8:00 = 北京时间 16:00
    - cron: '15 8 * * *'     # UTC 8:15 = 北京时间 16:15（备用）
    - cron: '0 12 * * *'     # UTC 12:00 = 北京时间 20:00
    - cron: '15 12 * * *'    # UTC 12:15 = 北京时间 20:15（备用）
  workflow_dispatch:

concurrency:
  group: screenshot-workflow
  cancel-in-progress: true

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        env:
          PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run screenshot script
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          GITEE_OWNER: ${{ secrets.GITEE_OWNER }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          LKWG_URL: ${{ secrets.LKWG_URL }}
        run: |
          python yxsr_ci.py