# ==============================================
# Gitee CI 流水线配置文件 - 最终版
# ==============================================
# 触发时间（北京时间）：
#   - 每天 08:00
#   - 每天 12:00
#   - 每天 16:00
#   - 每天 20:00
# 注意：Gitee CI 使用 UTC 时区，表达式中为 0,4,8,12 点（对应北京 8,12,16,20 点）
# ==============================================

version: '1.0'
name: master-pipeline
displayName: MasterPipeline
triggers:
  trigger: auto
  schedule:
    - cron: '0 0 0,4,8,12 * * ? *'
variables:
  DINGTALK_WEBHOOK: https://oapi.dingtalk.com/robot/send?access_token=c55ebdfe122fb8eec6520a3cae5572f072ff6311fae92c2fe1c0d363f4a2d42a
  DINGTALK_SECRET: SECe7cd9a6a7e89a794649d79e199d4b2ddfd133168706013902bea95c79f936765
  REPO_OWNER: zcszcszcs1
  REPO_NAME: lkwg
  ACCESS_TOKEN: c30374e614d04009eee37d80af99960d
stages:
  - name: compile
    displayName: 编译
    strategy: naturally
    trigger: auto
    steps:
      - step: build@python
        name: build_python
        displayName: Python 构建
        pythonVersion: '3.9'
        cache:
          - key: pip-cache-{{ checksum "requirements.txt" }}
            paths:
              - /root/.cache/pip
          - key: playwright-cache
            paths:
              - /root/.cache/ms-playwright
        commands:
          - export DINGTALK_WEBHOOK="${DINGTALK_WEBHOOK}"
          - export DINGTALK_SECRET="${DINGTALK_SECRET}"
          - export GITEE_REPO_OWNER="${REPO_OWNER}"
          - export GITEE_REPO_NAME="${REPO_NAME}"
          - export GITEE_ACCESS_TOKEN="${ACCESS_TOKEN}"
          - python3 -m pip install --upgrade pip
          - pip3 config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          - pip3 install -r requirements.txt
          - python3 -m playwright install chromium --with-deps
          - python3 ./main.py
        artifacts:
          - name: BUILD_ARTIFACT
            path:
              - ./
      - step: publish@general_artifacts
        name: publish_general_artifacts
        displayName: 上传制品
        dependArtifact: BUILD_ARTIFACT
        artifactName: output
        dependsOn: build_python
  - name: release
    displayName: 发布
    strategy: naturally
    trigger: auto
    steps:
      - step: publish@release_artifacts
        name: publish_release_artifacts
        displayName: 发布
        dependArtifact: output
        version: 1.0.0.0
        autoIncrement: true